spring.application.name=ragbook


spring.datasource.url=  ${db_url}
spring.datasource.username=${db_username}
spring.datasource.password=${db_pass}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Global Gemini API Key (used by chat and embedding when set)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
# Chat model
spring.ai.google.genai.chat.options.model=gemini-2.5-flash


# Remove these
# spring.ai.huggingface.embedding.api-key=${HF_TOKEN}
# spring.ai.huggingface.embedding.model=sentence-transformers/all-MiniLM-L6-v2
# spring.ai.huggingface.chat.enabled=false

# Add these
spring.ai.embedding.transformer.onnx.model-uri=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json

# Vector store ? 384 dimensions for all-MiniLM-L6-v2
spring.ai.vectorstore.mariadb.dimensions=384
spring.ai.vectorstore.mariadb.initialize-schema=true

# File upload size
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB


# Embedding-specific API Key
#spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}


# Embedding model (correct property path expected by Spring AI)
# New model (replaces deprecated text-embedding-004)
#spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

# Pin output to 768 dimensions (matches your MariaDB table)
#spring.ai.google.genai.embedding.text.options.dimensions=768

# Vector store must match
#spring.ai.vectorstore.mariadb.dimensions=768
#spring.ai.vectorstore.mariadb.initialize-schema=true



# Run app on a non-conflicting port by default
server.port=8081

#logging.level.org.springframework.ai=DEBUG
#logging.level.org.springframework.ai.vectorstore=TRACE